# ===============================
# 示例 1: 最简 SMB 配置
# ===============================
mounts:
  - name: nas
    type: smb
    smb:
      addr: 192.168.1.100
      share_name: shared
      username: user
      password: pass
    mount_dir_path: /mnt/nas

  - name: nas-backup
    type: smb
    smb:
      addr: 192.168.1.100
      share_name: backup
      username: user
      password: pass
    mount_dir_path: /mnt/backups

  - name: nas-media
    type: smb
    smb:
      addr: 192.168.1.100
      share_name: media
      username: user
      password: pass
    mount_dir_path: ~/Mounts/media
