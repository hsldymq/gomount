# 无密码配置示例
mounts:
  - name: secure-nas
    smb_addr: 192.168.1.100
    share_name: private
    username: user
    mount_dir_path: /mnt/secure-nas

  - name: secure-dev
    type: sshfs
    ssh:
      host: dev.example.com
      user: developer
      key_file: ~/.ssh/id_rsa
    remote_path: /home/developer
    mount_dir_path: /mnt/secure-dev

  - name: secure-cloud
    type: webdav
    webdav:
      url: https://cloud.example.com/dav
      username: user
    mount_dir_path: /mnt/secure-cloud
