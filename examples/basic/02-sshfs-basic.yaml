# SSHFS 基础配置
mounts:
  - name: dev-server
    type: sshfs
    ssh:
      host: dev.example.com
    remote_path: /home/developer/projects
    mount_dir_path: /mnt/dev-projects

  - name: internal-server
    type: sshfs
    ssh:
      host: internal-server          # ~/.ssh/config 别名（含 ProxyJump 配置）
    remote_path: /data
    mount_dir_path: /mnt/internal
