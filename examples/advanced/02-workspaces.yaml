# 工作区配置示例
mounts:
  - name: company-nas
    type: smb
    smb:
      addr: 10.0.1.10
      share_name: shared
      username: employee
      password: company123
    mount_dir_path: /mnt/company-nas

  - name: dev-server
    type: sshfs
    ssh:
      host: dev.company.com
    remote_path: /home/developer/projects
    mount_dir_path: /mnt/dev-projects

  - name: gitlab-storage
    type: webdav
    webdav:
      url: https://gitlab.company.com/dav
      username: dev
      password: token123
    mount_dir_path: /mnt/gitlab

  - name: personal-nas
    type: smb
    smb:
      addr: 192.168.1.100
      share_name: personal
      username: me
      password: mypass
    mount_dir_path: /mnt/personal-nas

  - name: cloud-backup
    type: webdav
    webdav:
      url: https://nextcloud.personal.com/remote.php/dav/files/me/
      username: me
    mount_dir_path: /mnt/cloud-backup

workspaces:
  - name: company-dev
    description: "公司开发环境"
    mounts:
      - company-nas
      - dev-server
      - gitlab-storage

  - name: personal-all
    description: "个人所有存储"
    mounts:
      - personal-nas
      - cloud-backup
